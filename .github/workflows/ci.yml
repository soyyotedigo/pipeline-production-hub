name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff>=0.4

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: MyPy
        run: mypy backend

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, typecheck]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vfxhub
          POSTGRES_PASSWORD: vfxhub_pass
          POSTGRES_DB: vfxhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vfxhub -d vfxhub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: development
      DATABASE_URL: postgresql://vfxhub:vfxhub_pass@localhost:5432/vfxhub
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci_test_secret_key
      JWT_ALG: HS256
      ACCESS_TOKEN_EXPIRE_MIN: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      BCRYPT_ROUNDS: 4
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: 5
      LOGIN_RATE_LIMIT_WINDOW_MIN: 15
      TASK_QUEUE_NAME: tasks:queue:default
      TASK_STATUS_TTL_SECONDS: 86400
      METRICS_ACTIVE_USERS_WINDOW_MIN: 15
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: ./data/storage
      STORAGE_URL_EXPIRES_DEFAULT: 3600
      STORAGE_MAX_UPLOAD_SIZE_BYTES: 1073741824
      PROJECT_EXPORT_ASYNC_THRESHOLD_ENTITIES: 1000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpq-dev

      - name: Install project with test extras
        run: pip install ".[dev,test]"

      - name: Run Alembic migrations
        run: alembic upgrade head
        env:
          PYTHONPATH: backend

      - name: Run tests with coverage
        run: pytest -v -m "not live" --cov=backend --cov-report=term-missing --cov-report=xml:coverage.xml
        env:
          PYTHONPATH: backend

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
